services:
  quiz-app: # 컨테이너들을 묶어서 부르는 서비스 그룹명/별명 (이미지 이름 아님)
    build: . # 현재 폴더(.)에 있는 Dockerfile을 읽어서 즉시 이미지를 구워냄
    container_name: python-quiz-cli # 실제로 구동될 도커 컨테이너의 진짜 이름
    
    # [핵심] 실시간 웜홀 (볼륨 마운트)
    # 왼쪽(내 컴퓨터의 현재 폴더)과 오른쪽(컨테이너 내부의 /app)을 동기화시킴.
    # 코드를 수정하거나 state.json에 점수가 저장되면 내 컴퓨터에도 즉시 반영됨.
    volumes:
      - .:/app
      
    # [생명줄] CLI 대화형 모드 (input 대기) 및 가상 터미널 설정
    # 이 두 줄이 있어야 파이썬의 input() 입력이 먹히고, Ctrl+C로 정상 종료할 수 있음.
    stdin_open: true # 키보드 입력을 받을 수 있도록 표준 입력(STDIN) 통로를 열어둠
    tty: true        # 가상 터미널을 할당하여 텍스트 출력과 신호 전달을 매끄럽게 함